---
- name: Laboratorio Ansible - Configuración de servidores
  hosts: docker
  gather_facts: true

  tasks:

    - name: Mostrar el nombre del host
      debug:
        msg: "El hostname del servidor es {{ ansible_hostname }}"

    - name: Mostrar el sistema operativo
      debug:
        msg: "El sistema operativo es {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Crear el directorio /tmp/ansible-demo
      file:
        path: /tmp/ansible-demo
        state: directory
        mode: '0755'

    - name: Crear archivo info.txt
      file:
        path: /tmp/ansible-demo/info.txt
        state: touch
        mode: '0644'

    - name: Escribir en info.txt el nombre del servidor y el sistema operativo
      copy:
        content: |
          Servidor: {{ ansible_hostname }}
          Sistema operativo: {{ ansible_distribution }} {{ ansible_distribution_version }}
        dest: /tmp/ansible-demo/info.txt

    - name: Crear directorios mediante loop
      file:
        path: "/tmp/ansible-demo/{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - logs
        - backup
        - config

    - name: Mostrar mensaje solo si el sistema operativo es Ubuntu
      debug:
        msg: "Este servidor corre Ubuntu. ¡Todo listo!"
      when: ansible_distribution == "Ubuntu"
